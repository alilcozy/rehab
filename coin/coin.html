<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../index.css" />
    <link rel="stylesheet" href="coin.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet" />

    <script src="coin.js"></script>
    <title>Coin Flip</title>
</head>

<body>
    <div class="header">
        <h2 class="back"><a href="../index.html">Back</a></h2>
    </div>
    <div>
        <form method="GET" class="questions" id="form" action="./results.html">
            <h2 class="coin-title">Flip a coin</h2>
            <div class="question"><label class="label" for="heads">Heads:</label>
            <input type="text" name="heads" id="heads" placeholder="Drink bubble tea"></div>

            <div class="question"><label class="label" for="tails">Tails:</label>
            <input type="text" name="tails" id="tails" placeholder="Save money"></div>
            <input type="submit" value="Flip"  class="submit">
        </form>
    </div>
</body>

</html>
